name: Phase7 Day Master Hotfix Once

on:
  push:
    branches:
      - hotfix/phase7-day-master-position
    paths:
      - .github/workflows/phase7-hotfix-once.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/phase7-hotfix-once.yml

permissions:
  contents: write

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix/phase7-day-master-position
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply surgical fix and regression test
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          phase7_path = Path("src/mingli/phase7.py")
          source = phase7_path.read_text(encoding="utf-8")

          anchor = '''    pillars = _pillars_from_value(derived_chart)
              growth_targets = tuple((stem, branch) for _, stem, branch in pillars)
          '''
          replacement = '''    pillars = _pillars_from_value(derived_chart)
              day_masters = [stem for position, stem, _branch in pillars if position == "day"]
              if len(day_masters) != 1:
                  raise ValueError("derived pillars must contain exactly one day pillar")
              day_master = day_masters[0]
              growth_targets = tuple((stem, branch) for _, stem, branch in pillars)
          '''
          if source.count(anchor) != 1:
              raise SystemExit("unexpected Phase 7 pillar anchor")
          source = source.replace(anchor, replacement)

          replacements = {
              "map_hidden_stems(branch, day_master=pillars[2][1])": "map_hidden_stems(branch, day_master=day_master)",
              "map_ten_god(pillars[2][1], stem)": "map_ten_god(day_master, stem)",
          }
          for old, new in replacements.items():
              if source.count(old) != 1:
                  raise SystemExit(f"unexpected Phase 7 occurrence count: {old}")
              source = source.replace(old, new)
          if "pillars[2][1]" in source:
              raise SystemExit("positional day-master access remains")
          phase7_path.write_text(source, encoding="utf-8")

          test_path = Path("tests/test_phase7_day_master_regression.py")
          test_path.write_text('''from __future__ import annotations

import unittest

from mingli.bazi import DeterministicBaziEngine
from mingli.derived.static_engine import map_hidden_stems, map_ten_god
from mingli.phase7 import build_bazi_fact_graph
from mingli.phase9_engine import calculate_day_master_strength
from mingli.phase10_engine import evaluate_bazi_pattern


def _base_chart() -> dict[str, object]:
    return DeterministicBaziEngine().calculate(
        {
            "birth_date": "2000-01-07",
            "birth_time": "12:00",
            "timezone": "Asia/Shanghai",
            "gender": "male",
            "calendar": "solar",
            "longitude": 121.4737,
            "latitude": 31.2304,
            "true_solar_time": False,
        }
    )


def _derived_chart_with_list_pillars() -> dict[str, object]:
    return {
        "method_id": "phase7-day-master-regression-fixture",
        "calculation_version": "1",
        "pillars": [
            {"position": "year", "stem": "甲", "branch": "子"},
            {"position": "month", "stem": "丙", "branch": "寅"},
            {"position": "day", "stem": "辛", "branch": "酉"},
            {"position": "hour", "stem": "壬", "branch": "辰"},
        ],
    }


class Phase7DayMasterRegressionTests(unittest.TestCase):
    def _graph(self) -> dict[str, object]:
        return build_bazi_fact_graph(
            _base_chart(),
            derived_chart=_derived_chart_with_list_pillars(),
            dayun_count=1,
            liunian_start_year=2006,
            liunian_end_year=2006,
        ).to_dict()

    def test_visible_and_hidden_ten_gods_use_day_position_not_sorted_index(self) -> None:
        graph = self._graph()
        nodes = list(graph["nodes"])
        day_master = "辛"
        pillars = (
            ("year", "甲", "子"),
            ("month", "丙", "寅"),
            ("day", "辛", "酉"),
            ("hour", "壬", "辰"),
        )

        for position, stem, branch in pillars:
            with self.subTest(position=position, kind="visible"):
                ten_gods = [
                    node
                    for node in nodes
                    if node.get("node_type") == "TenGod"
                    and str(node.get("node_id", "")).startswith(f"ten-god:{position}:")
                ]
                self.assertEqual(1, len(ten_gods))
                self.assertEqual(map_ten_god(day_master, stem).code, ten_gods[0]["code"])

            with self.subTest(position=position, kind="hidden"):
                actual = sorted(
                    (
                        node
                        for node in nodes
                        if node.get("node_type") == "HiddenStem"
                        and str(node.get("node_id", "")).startswith(f"hidden-stem:{position}:{branch}:")
                    ),
                    key=lambda node: int(node["ordinal"]),
                )
                expected = map_hidden_stems(branch, day_master=day_master)
                self.assertEqual(
                    [(item.stem, item.ordinal, item.ten_god.code) for item in expected],
                    [(item["stem"], item["ordinal"], item["ten_god"]) for item in actual],
                )

    def test_real_phase7_graph_passes_phase9_and_phase10_contracts(self) -> None:
        graph = self._graph()
        strength = calculate_day_master_strength(graph).to_dict()
        pattern = evaluate_bazi_pattern(graph, strength)

        self.assertEqual("辛", strength["day_master"])
        self.assertTrue(pattern.candidates)
        self.assertEqual(graph["canonical_hash"], pattern.fact_graph_hash)


if __name__ == "__main__":
    unittest.main()
''', encoding="utf-8")
          PY

      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -e ".[dev]"

      - name: Compile
        run: python -m compileall -q src tests

      - name: Targeted regression tests
        run: >-
          python -m pytest -q
          tests/test_phase7_day_master_regression.py
          tests/test_phase7_fact_graph.py
          tests/test_phase10_pattern_evaluation.py
          tests/test_phase23_runtime.py

      - name: Full pytest suite
        run: python -m pytest -q

      - name: Full unittest suite
        run: python -m unittest discover

      - name: Diff validation
        run: |
          git diff --check
          test "$(git status --short | wc -l)" -eq 2
          git status --short

      - name: Commit hotfix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/mingli/phase7.py tests/test_phase7_day_master_regression.py
          git commit -m "fix: resolve phase7 day master by pillar position"
          git push origin HEAD:hotfix/phase7-day-master-position
