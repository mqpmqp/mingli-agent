name: Core Runtime Verification

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/finalize-core-runtime-v0.1-verification
      - agent/knowledge-os-v0.2

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Compile
        run: python -m compileall src tests

      - name: Run unittest
        run: python -m unittest discover -v

      - name: Run pytest
        run: python -m pytest -q

      - name: Validate spec
        run: python -m mingli.cli validate-spec spec

      - name: Validate rules
        run: python -m mingli.cli validate-rules spec/rules

      - name: Run static benchmark
        run: python -m mingli.cli benchmark-static spec/evaluation/golden_cases_v0.2.jsonl

      - name: Validate knowledge repository
        run: |
          python -m mingli.cli knowledge-validate knowledge
          python -m mingli.cli knowledge-inventory knowledge

      - name: Verify deterministic Bazi engine
        run: |
          python -m mingli.cli chart-validate --strict
          python -m mingli.cli chart-benchmark --independent-only

      - name: Verify pilot import and rollback
        run: |
          temp_dir="$(mktemp -d)"
          cp -a . "$temp_dir/repo"
          cd "$temp_dir/repo"
          batch_id="$(python -c 'from pathlib import Path; print(next(Path("knowledge/batches/manifests").glob("*.json")).stem)')"
          python -m mingli.cli knowledge-rollback "$batch_id"
          baseline="$(python -m mingli.cli knowledge-inventory knowledge)"
          python -m mingli.cli knowledge-import spec/knowledge/pilots/zhouyi_yu_yucexue_ch01
          test "$(wc -l < knowledge/concepts/reviewed/yijing/zhouyi_yu_yucexue_ch01.jsonl)" -eq 30
          test "$(wc -l < knowledge/rules/reviewed/yijing/zhouyi_yu_yucexue_ch01.jsonl)" -eq 14
          test "$(wc -l < knowledge/evidence/reviewed/yijing/zhouyi_yu_yucexue_ch01.jsonl)" -eq 8
          test "$(wc -l < knowledge/benchmarks/draft/yijing/zhouyi_yu_yucexue_ch01.jsonl)" -eq 8
          python -m mingli.cli knowledge-rollback "$batch_id" --dry-run
          python -m mingli.cli knowledge-rollback "$batch_id"
          python -m mingli.cli knowledge-validate knowledge
          test "$(python -m mingli.cli knowledge-inventory knowledge)" = "$baseline"

      - name: Check patch whitespace
        run: |
          git diff --check
          git diff --check origin/main...HEAD

      - name: Confirm spec is unchanged
        run: git diff --exit-code origin/main...HEAD -- spec

      - name: Confirm knowledge is unchanged
        run: git diff --exit-code origin/main...HEAD -- knowledge
