name: Core Runtime Verification

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - agent/finalize-core-runtime-v0.1-verification
      - agent/knowledge-os-v0.2

permissions:
  contents: read

jobs:
  fast_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Compile
        run: python -m compileall src tests scripts

      - name: Run fast test gate
        run: test-fast --timeout-seconds 300 --junitxml artifacts/test-fast.xml -- -q

      - name: Upload fast test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-fast-report
          path: artifacts/test-fast.xml
          if-no-files-found: error

  real_case_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run real-case test gate
        run: test-real-case --timeout-seconds 600 --junitxml artifacts/test-real-case.xml -- -q

      - name: Verify real-case privacy and package boundaries
        run: |
          python scripts/check_validation_privacy.py
          python scripts/check_validation_privacy.py --archives dist
          python -m mingli.cli validation benchmark

      - name: Upload real-case test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-real-case-report
          path: artifacts/test-real-case.xml
          if-no-files-found: error

  benchmark_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Compile
        run: python -m compileall src tests

      - name: Run benchmark test gate
        run: test-benchmark --timeout-seconds 1800 --junitxml artifacts/test-benchmark.xml -- -q

      - name: Upload benchmark test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-benchmark-report
          path: artifacts/test-benchmark.xml
          if-no-files-found: error

      - name: Validate spec
        run: python -m mingli.cli validate-spec spec

      - name: Validate rules
        run: python -m mingli.cli validate-rules spec/rules

      - name: Run static benchmark
        run: python -m mingli.cli benchmark-static spec/evaluation/golden_cases_v0.2.jsonl

      - name: Validate knowledge repository
        run: |
          python -m mingli.cli knowledge-validate knowledge
          python -m mingli.cli knowledge-inventory knowledge

      - name: Verify deterministic Bazi engine
        run: |
          python -m mingli.cli chart-validate --strict
          python -m mingli.cli chart-benchmark --independent-only

      - name: Verify Phase 12-24 source and isolated wheel
        shell: bash
        run: |
          set -euo pipefail
          python -m mingli.phase12_cli validate
          python -m mingli.phase12_cli benchmark
          python -m mingli.phase13_cli validate
          python -m mingli.phase13_cli benchmark
          python -m mingli.phase14_cli validate
          python -m mingli.phase14_cli benchmark
          python -m mingli.phase15_cli validate
          python -m mingli.phase15_cli benchmark
          python -m mingli.phase16_cli validate
          python -m mingli.phase16_cli benchmark
          python -m mingli.phase17_cli validate
          python -m mingli.phase17_cli benchmark
          python -m mingli.phase18_cli benchmark
          python -m mingli.phase19_cli validate
          python -m mingli.phase19_cli benchmark
          python -m mingli.phase20_cli benchmark
          python -m mingli.phase21_cli benchmark
          python -m mingli.phase22_cli benchmark
          python -m mingli.phase23_cli benchmark
          python -m mingli.phase24_cli assess
          python -m mingli.phase24_cli benchmark
          source_phase12_hash="$(python -c 'from mingli.derived.static_engine import BRANCHES, STEMS; from mingli.phase12 import build_xiji_fixture, evaluate_bazi_xiji_roles; print(evaluate_bazi_xiji_roles(build_xiji_fixture(STEMS[0], BRANCHES[2])).canonical_hash)')"
          source_phase13_hash="$(python -c 'from mingli.derived.static_engine import BRANCHES, STEMS; from mingli.phase13 import build_phase13_fixture, evaluate_luck_cycle_role_interactions; graph, xiji = build_phase13_fixture(STEMS[0], BRANCHES[2]); print(evaluate_luck_cycle_role_interactions(graph, xiji).canonical_hash)')"
          source_phase14_hash="$(python -c 'from mingli.derived.static_engine import BRANCHES, STEMS; from mingli.phase14 import build_phase14_fixture, evaluate_bazi_temporal_trends; graph, interaction = build_phase14_fixture(STEMS[0], BRANCHES[2]); print(evaluate_bazi_temporal_trends(graph, interaction).canonical_hash)')"
          source_phase15_hash="$(python -c 'from mingli.derived.static_engine import BRANCHES, STEMS; from mingli.phase15 import build_phase15_fixture, evaluate_bazi_tengod_domains; graph, interaction, trend = build_phase15_fixture(STEMS[0], BRANCHES[2]); print(evaluate_bazi_tengod_domains(graph, interaction, trend).canonical_hash)')"
          source_phase16_hash="$(python -c 'from mingli.derived.static_engine import BRANCHES, STEMS; from mingli.phase16 import build_phase16_fixture, evaluate_base_domain_contracts; print(evaluate_base_domain_contracts(build_phase16_fixture(STEMS[0], BRANCHES[2])).canonical_hash)')"
          source_phase19_hash="$(python -c 'from mingli.contracts.serialization import digest; from mingli.phase19 import load_chenggu_table; print(digest(load_chenggu_table()))')"
          source_phase24_hash="$(python -c 'from mingli.phase24 import assess_release_candidate; print(assess_release_candidate().canonical_hash)')"
          python -m build
          wheel_venv="$(mktemp -d)/venv"
          python -m venv "$wheel_venv"
          "$wheel_venv/bin/python" -m pip install --disable-pip-version-check dist/*.whl
          "$wheel_venv/bin/python" -I -m mingli.phase12_cli validate
          "$wheel_venv/bin/python" -I -m mingli.phase12_cli benchmark
          "$wheel_venv/bin/python" -I -m mingli.phase13_cli validate
          "$wheel_venv/bin/python" -I -m mingli.phase13_cli benchmark
          "$wheel_venv/bin/python" -I -m mingli.phase14_cli validate
          "$wheel_venv/bin/python" -I -m mingli.phase14_cli benchmark
          "$wheel_venv/bin/python" -I -m mingli.phase15_cli validate
          "$wheel_venv/bin/python" -I -m mingli.phase15_cli benchmark
          "$wheel_venv/bin/python" -I -m mingli.phase16_cli validate
          "$wheel_venv/bin/python" -I -m mingli.phase16_cli benchmark
          "$wheel_venv/bin/python" -I -m mingli.phase17_cli validate
          "$wheel_venv/bin/python" -I -m mingli.phase17_cli benchmark
          "$wheel_venv/bin/python" -I -m mingli.phase18_cli benchmark
          "$wheel_venv/bin/python" -I -m mingli.phase19_cli validate
          "$wheel_venv/bin/python" -I -m mingli.phase19_cli benchmark
          "$wheel_venv/bin/python" -I -m mingli.phase20_cli benchmark
          "$wheel_venv/bin/python" -I -m mingli.phase21_cli benchmark
          "$wheel_venv/bin/python" -I -m mingli.phase22_cli benchmark
          "$wheel_venv/bin/python" -I -m mingli.phase23_cli benchmark
          "$wheel_venv/bin/python" -I -m mingli.phase24_cli assess
          "$wheel_venv/bin/python" -I -m mingli.phase24_cli benchmark
          installed_phase12_hash="$("$wheel_venv/bin/python" -I -c 'from mingli.derived.static_engine import BRANCHES, STEMS; from mingli.phase12 import build_xiji_fixture, evaluate_bazi_xiji_roles; print(evaluate_bazi_xiji_roles(build_xiji_fixture(STEMS[0], BRANCHES[2])).canonical_hash)')"
          installed_phase13_hash="$("$wheel_venv/bin/python" -I -c 'from mingli.derived.static_engine import BRANCHES, STEMS; from mingli.phase13 import build_phase13_fixture, evaluate_luck_cycle_role_interactions; graph, xiji = build_phase13_fixture(STEMS[0], BRANCHES[2]); print(evaluate_luck_cycle_role_interactions(graph, xiji).canonical_hash)')"
          installed_phase14_hash="$("$wheel_venv/bin/python" -I -c 'from mingli.derived.static_engine import BRANCHES, STEMS; from mingli.phase14 import build_phase14_fixture, evaluate_bazi_temporal_trends; graph, interaction = build_phase14_fixture(STEMS[0], BRANCHES[2]); print(evaluate_bazi_temporal_trends(graph, interaction).canonical_hash)')"
          installed_phase15_hash="$("$wheel_venv/bin/python" -I -c 'from mingli.derived.static_engine import BRANCHES, STEMS; from mingli.phase15 import build_phase15_fixture, evaluate_bazi_tengod_domains; graph, interaction, trend = build_phase15_fixture(STEMS[0], BRANCHES[2]); print(evaluate_bazi_tengod_domains(graph, interaction, trend).canonical_hash)')"
          installed_phase16_hash="$("$wheel_venv/bin/python" -I -c 'from mingli.derived.static_engine import BRANCHES, STEMS; from mingli.phase16 import build_phase16_fixture, evaluate_base_domain_contracts; print(evaluate_base_domain_contracts(build_phase16_fixture(STEMS[0], BRANCHES[2])).canonical_hash)')"
          installed_phase19_hash="$("$wheel_venv/bin/python" -I -c 'from mingli.contracts.serialization import digest; from mingli.phase19 import load_chenggu_table; print(digest(load_chenggu_table()))')"
          installed_phase24_hash="$("$wheel_venv/bin/python" -I -c 'from mingli.phase24 import assess_release_candidate; print(assess_release_candidate().canonical_hash)')"
          test "$source_phase12_hash" = "$installed_phase12_hash"
          test "$source_phase13_hash" = "$installed_phase13_hash"
          test "$source_phase14_hash" = "$installed_phase14_hash"
          test "$source_phase15_hash" = "$installed_phase15_hash"
          test "$source_phase16_hash" = "$installed_phase16_hash"
          test "$source_phase19_hash" = "$installed_phase19_hash"
          test "$source_phase24_hash" = "$installed_phase24_hash"
          printf 'phase12_source_hash=%s\nphase12_installed_hash=%s\nphase13_source_hash=%s\nphase13_installed_hash=%s\nphase14_source_hash=%s\nphase14_installed_hash=%s\nphase15_source_hash=%s\nphase15_installed_hash=%s\nphase16_source_hash=%s\nphase16_installed_hash=%s\nphase19_source_hash=%s\nphase19_installed_hash=%s\nphase24_source_hash=%s\nphase24_installed_hash=%s\n' "$source_phase12_hash" "$installed_phase12_hash" "$source_phase13_hash" "$installed_phase13_hash" "$source_phase14_hash" "$installed_phase14_hash" "$source_phase15_hash" "$installed_phase15_hash" "$source_phase16_hash" "$installed_phase16_hash" "$source_phase19_hash" "$installed_phase19_hash" "$source_phase24_hash" "$installed_phase24_hash"

      - name: Verify pilot import and rollback
        run: |
          temp_dir="$(mktemp -d)"
          cp -a . "$temp_dir/repo"
          cd "$temp_dir/repo"
          batch_id="$(python -c 'from pathlib import Path; print(next(Path("knowledge/batches/manifests").glob("*.json")).stem)')"
          python -m mingli.cli knowledge-rollback "$batch_id"
          baseline="$(python -m mingli.cli knowledge-inventory knowledge)"
          python -m mingli.cli knowledge-import spec/knowledge/pilots/zhouyi_yu_yucexue_ch01
          test "$(wc -l < knowledge/concepts/reviewed/yijing/zhouyi_yu_yucexue_ch01.jsonl)" -eq 30
          test "$(wc -l < knowledge/rules/reviewed/yijing/zhouyi_yu_yucexue_ch01.jsonl)" -eq 14
          test "$(wc -l < knowledge/evidence/reviewed/yijing/zhouyi_yu_yucexue_ch01.jsonl)" -eq 8
          test "$(wc -l < knowledge/benchmarks/draft/yijing/zhouyi_yu_yucexue_ch01.jsonl)" -eq 8
          python -m mingli.cli knowledge-rollback "$batch_id" --dry-run
          python -m mingli.cli knowledge-rollback "$batch_id"
          python -m mingli.cli knowledge-validate knowledge
          test "$(python -m mingli.cli knowledge-inventory knowledge)" = "$baseline"

      - name: Check patch whitespace
        run: |
          git diff --check
          git diff --check origin/main...HEAD

      - name: Confirm spec is unchanged
        run: git diff --exit-code origin/main...HEAD -- spec

      - name: Confirm knowledge is unchanged
        run: git diff --exit-code origin/main...HEAD -- knowledge
